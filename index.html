width:100%;
padding:12px;
margin-top:15px;

display:flex;

margin-bottom:15px;
gap:10px;
flex-wrap:wrap;
}

background:#0f172a;
padding:10px;
border-radius:10px;

}

height:12px;
background:#0f172a;
border-radius:20px;
overflow:hidden;

}

#progress{
height:100%;
width:0%;

transition:.3s;

.answers{

.answers button{

.wrong{background:#dc2626 !important;}

/* RESULT */

}

.badge{

left:15px;

let i=0,
xp=0,
correctAnswers=0,
wrongAnswers=0,
timer;
let playerName="";
let gameQuestions=[];
let selectedCategory="All";

function start(){

playerName =
document.getElementById("name").value || "Anonymous";
selectedCategory =
document.getElementById("category").value;

document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

let pool=q;

if(selectedCategory!=="All"){
pool=q.filter(
question=>question.cat===selectedCategory
);
}

pool.sort(() => Math.random() - 0.5);

gameQuestions=pool.slice(0,20);

load();
}

function load(){
clearInterval(timer);
let time=15;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){next();}
},1000);

let cur = gameQuestions[i];

document.getElementById("question").innerHTML = `
<div style="font-size:14px;color:#22c55e;margin-bottom:8px">
${cur.cat}
</div>
${cur.q}
`;

let box=document.getElementById("answers");
box.innerHTML="";

cur.a.forEach((x,idx)=>{
let b=document.createElement("button");
b.innerText=x;
b.onclick=()=>check(idx);
box.appendChild(b);
});

document.getElementById("progress").style.width=((i+1)/gameQuestions.length)*100+"%";}

function check(idx){
clearInterval(timer);
let buttons=document.querySelectorAll(".answers button");

buttons.forEach(b=>b.disabled=true);

if(idx===gameQuestions[i].c){document.getElementById("correct").play();
buttons[idx].classList.add("correct");
xp+=10;
correctAnswers++;
document.getElementById("xp").innerText=xp;
}else{
document.getElementById("wrong").play();
buttons[idx].classList.add("wrong");
buttons[gameQuestions[i].c].classList.add("correct");
wrongAnswers++;
}

setTimeout(next,800);
}

function next(){
i++;
if(i>=gameQuestions.length)finish();else load();
}

function finish(){

document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let rank="Beginner";
let badge="Recruit";

if(xp>=30){rank="Supporter";badge="🔥 Supporter";}
if(xp>=60){rank="Warrior";badge="⚔️ Warrior";}
if(xp>=90){rank="Legend";badge="👑 Legend";}

document.getElementById("finalXp").innerText=xp;
document.getElementById("finalRank").innerText=rank;
let accuracy =
Math.round(
(correctAnswers / gameQuestions.length) * 100
);

document.getElementById("correctCount").innerText =
correctAnswers;

document.getElementById("wrongCount").innerText =
wrongAnswers;

document.getElementById("accuracy").innerText =
accuracy;
document.getElementById("badge").innerText=badge;

save(rank);
}

function save(rank){
let board=JSON.parse(localStorage.getItem("mgot"))||[];
board.push({
name:playerName,
xp:xp,
rank:rank
});
board.sort((a,b)=>b.xp-a.xp);
localStorage.setItem("mgot",JSON.stringify(board));
render();
}

function clearBoard(){
localStorage.removeItem("mgot");
render();
}

function render(){
    let board = JSON.parse(localStorage.getItem("mgot")) || [];

    let list = document.getElementById("board");

    list.innerHTML = "";

    board.slice(0,10).forEach(p => {

        list.innerHTML += `
        <li>${p.name} - ${p.xp} XP (${p.rank})</li>
        `;

    });
}

function restart(){

i = 0;
xp = 0;
correctAnswers = 0;
wrongAnswers = 0;

clearInterval(timer);

document.getElementById("xp").innerText = 0;

document.getElementById("result").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

let pool = q;

if(selectedCategory !== "All"){
    pool = q.filter(
        question => question.cat === selectedCategory
    );
}

pool.sort(() => Math.random() - 0.5);

gameQuestions = pool.slice(0,20);

load();
}
